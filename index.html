<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>THE TIMER OF TIMERS</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --ring: #1e1e2e;
    --accent: #e8ff3c;
    --accent2: #ff6b35;
    --text: #f0f0f0;
    --muted: #555570;
    --danger: #ff3c5f;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  /* Background grain */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    opacity: 0.4;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 40px;
    padding: 40px 20px;
  }


  /* Clock face */
  .clock-wrap {
    position: relative;
    width: 280px;
    height: 280px;
  }

  .clock-svg {
    width: 100%;
    height: 100%;
    transform: rotate(-90deg);
  }

  .clock-bg {
    fill: none;
    stroke: var(--ring);
    stroke-width: 8;
  }

  .clock-progress {
    fill: none;
    stroke: var(--accent);
    stroke-width: 8;
    stroke-linecap: round;
    stroke-dasharray: 754;
    stroke-dashoffset: 0;
    transition: stroke-dashoffset 0.25s linear, stroke 0.3s ease;
    filter: drop-shadow(0 0 6px var(--accent));
  }

  .clock-progress.warning {
    stroke: var(--accent2);
    filter: drop-shadow(0 0 6px var(--accent2));
  }

  .clock-progress.danger {
    stroke: var(--danger);
    filter: drop-shadow(0 0 8px var(--danger));
  }

  .clock-center {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
  }

  .time-display {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(3rem, 12vw, 4.5rem);
    letter-spacing: 0.05em;
    line-height: 1;
    transition: color 0.3s;
  }

  .lap-count {
    font-size: 0.7rem;
    color: var(--muted);
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }

  /* Controls */
  .controls {
    display: flex;
    gap: 16px;
    align-items: center;
  }

  .btn {
    border: none;
    cursor: pointer;
    font-family: 'DM Mono', monospace;
    font-size: 0.8rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    transition: all 0.15s ease;
    border-radius: 4px;
  }

  .btn-primary {
    background: var(--accent);
    color: var(--bg);
    padding: 14px 36px;
    font-weight: 500;
    font-size: 0.9rem;
    letter-spacing: 0.15em;
  }

  .btn-primary:hover { background: #d4eb30; transform: translateY(-1px); }
  .btn-primary:active { transform: translateY(0); }

  .btn-primary.running {
    background: var(--danger);
    color: #fff;
  }

  .btn-secondary {
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--ring);
    padding: 13px 20px;
  }

  .btn-secondary:hover { border-color: var(--muted); color: var(--text); }

  /* Settings */
  .settings {
    background: var(--surface);
    border: 1px solid var(--ring);
    border-radius: 8px;
    padding: 24px;
    width: 300px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .setting-row {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .setting-label {
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .time-inputs {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .time-input-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    flex: 1;
  }

  .time-input-wrap span {
    font-size: 0.6rem;
    color: var(--muted);
    letter-spacing: 0.1em;
  }

  .time-input {
    background: var(--bg);
    border: 1px solid var(--ring);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 1.4rem;
    width: 100%;
    text-align: center;
    padding: 10px 6px;
    border-radius: 4px;
    transition: border-color 0.15s;
  }

  .time-input:focus {
    outline: none;
    border-color: var(--accent);
  }

  .time-sep {
    font-size: 1.4rem;
    color: var(--muted);
    margin-top: -12px;
  }

  /* Toggle */
  .toggle-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .toggle {
    position: relative;
    width: 44px;
    height: 24px;
  }

  .toggle input { opacity: 0; width: 0; height: 0; }

  .slider {
    position: absolute;
    inset: 0;
    background: var(--ring);
    border-radius: 24px;
    cursor: pointer;
    transition: 0.2s;
  }

  .slider::before {
    content: '';
    position: absolute;
    width: 18px;
    height: 18px;
    left: 3px;
    top: 3px;
    background: var(--muted);
    border-radius: 50%;
    transition: 0.2s;
  }

  input:checked + .slider { background: var(--accent); }
  input:checked + .slider::before { transform: translateX(20px); background: var(--bg); }

  /* Lap log */
  .lap-log {
    width: 300px;
    max-height: 120px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .lap-log:empty::before {
    content: 'Laps will appear here';
    color: var(--muted);
    font-size: 0.7rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .lap-entry {
    display: flex;
    justify-content: space-between;
    font-size: 0.75rem;
    color: var(--muted);
    padding: 4px 8px;
    background: var(--surface);
    border-radius: 3px;
    border-left: 2px solid var(--ring);
    animation: slideIn 0.2s ease;
  }

  .lap-entry.latest { border-color: var(--accent); color: var(--text); }

  @keyframes slideIn {
    from { opacity: 0; transform: translateX(-8px); }
    to { opacity: 1; transform: translateX(0); }
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .pulsing { animation: pulse 0.5s ease 3; }

  .timer-name-wrap {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 18px;
  }

  .timer-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.6rem;
    letter-spacing: 0.08em;
    color: var(--text);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: border-color 0.2s;
    line-height: 1.1;
  }

  .timer-name:hover {
    border-bottom-color: var(--accent);
  }

  .rename-btn {
    background: none;
    border: none;
    color: var(--muted);
    font-size: 1rem;
    cursor: pointer;
    padding: 2px 4px;
    transition: color 0.2s;
    line-height: 1;
  }

  .rename-btn:hover { color: var(--accent); }

  .rename-input {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.6rem;
    letter-spacing: 0.08em;
    background: transparent;
    border: none;
    border-bottom: 2px solid var(--accent);
    color: var(--text);
    outline: none;
    width: 240px;
    text-align: center;
  }

  .lap-log::-webkit-scrollbar { width: 4px; }
  .lap-log::-webkit-scrollbar-track { background: transparent; }
  .lap-log::-webkit-scrollbar-thumb { background: var(--ring); border-radius: 2px; }
</style>
</head>
<body>
<div class="container">
  <div class="timer-name-wrap">
    <span class="timer-name" id="timerName" title="Click to rename">THE TIMER OF TIMERS</span>
    <button class="rename-btn" id="renameBtn" title="Rename timer">&#9998;</button>
  </div>

  <div class="clock-wrap">
    <svg class="clock-svg" viewBox="0 0 260 260">
      <circle class="clock-bg" cx="130" cy="130" r="120"/>
      <circle class="clock-progress" id="progressRing" cx="130" cy="130" r="120"/>
    </svg>
    <div class="clock-center">
      <div class="time-display" id="timeDisplay">00:00</div>
      <div class="lap-count" id="lapCount">Lap 0</div>
    </div>
  </div>

  <div class="controls">
    <button class="btn btn-secondary" id="resetBtn">Reset</button>
    <button class="btn btn-primary" id="startBtn">Start</button>
  </div>

  <div class="settings">
    <div class="setting-row">
      <div class="setting-label">Interval Duration</div>
      <div class="time-inputs">
        <div class="time-input-wrap">
          <input type="number" class="time-input" id="inputMin" value="8" min="0" max="99" placeholder="00">
          <span>min</span>
        </div>
        <div class="time-sep">:</div>
        <div class="time-input-wrap">
          <input type="number" class="time-input" id="inputSec" value="0" min="0" max="59" placeholder="00">
          <span>sec</span>
        </div>
      </div>
    </div>

    <div class="setting-row">
      <div class="toggle-row">
        <div class="setting-label">Bell Sound</div>
        <div style="display:flex;align-items:center;gap:10px;">
          <button class="btn btn-secondary" id="testBellBtn" style="padding:6px 14px;font-size:0.7rem;">Test</button>
          <label class="toggle">
            <input type="checkbox" id="bellToggle" checked>
            <span class="slider"></span>
          </label>
        </div>
      </div>
    </div>

    <div class="setting-row">
      <div class="toggle-row">
        <div class="setting-label">Auto Restart</div>
        <label class="toggle">
          <input type="checkbox" id="autoToggle" checked>
          <span class="slider"></span>
        </label>
      </div>
    </div>
  </div>

  <div class="lap-log" id="lapLog"></div>
</div>

<script>
  const CIRCUMFERENCE = 2 * Math.PI * 120; // ~754

  let totalSeconds = 0;
  let remaining = 0;
  let interval = null;
  let running = false;
  let lapCount = 0;
  let lapTimes = [];

  const timeDisplay = document.getElementById('timeDisplay');
  const lapCountEl = document.getElementById('lapCount');
  const progressRing = document.getElementById('progressRing');
  const startBtn = document.getElementById('startBtn');
  const resetBtn = document.getElementById('resetBtn');
  const inputMin = document.getElementById('inputMin');
  const inputSec = document.getElementById('inputSec');
  const bellToggle = document.getElementById('bellToggle');
  const autoToggle = document.getElementById('autoToggle');
  const lapLog = document.getElementById('lapLog');
  const timerNameEl = document.getElementById('timerName');
  const renameBtn = document.getElementById('renameBtn');

  // Timer name editing
  function startRename() {
    const current = timerNameEl.textContent;
    const input = document.createElement('input');
    input.type = 'text';
    input.className = 'rename-input';
    input.value = current;
    input.maxLength = 40;
    timerNameEl.replaceWith(input);
    renameBtn.style.display = 'none';
    input.focus();
    input.select();

    function commitRename() {
      const newName = input.value.trim() || 'Interval Timer';
      timerNameEl.textContent = newName;
      input.replaceWith(timerNameEl);
      renameBtn.style.display = '';
    }

    input.addEventListener('blur', commitRename);
    input.addEventListener('keydown', e => {
      if (e.key === 'Enter') input.blur();
      if (e.key === 'Escape') { input.value = current; input.blur(); }
    });
  }

  timerNameEl.addEventListener('click', startRename);
  renameBtn.addEventListener('click', startRename);

  // Embedded bell audio
  const bellAudio = new Audio('class_bell_change_shorter.mp3');
  async function ensureAudio() {
    // no-op, kept for compatibility
  }

  async function playBell() {
    if (!bellToggle.checked) return;
    bellAudio.currentTime = 0;
    bellAudio.play().catch(() => {});
  }

  function getInputSeconds() {
    const m = parseInt(inputMin.value) || 0;
    const s = parseInt(inputSec.value) || 0;
    return (m * 60) + Math.min(s, 59);
  }

  function formatTime(secs) {
    const m = Math.floor(secs / 60);
    const s = secs % 60;
    return `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
  }

  function updateDisplay() {
    timeDisplay.textContent = formatTime(remaining);

    const ratio = totalSeconds > 0 ? remaining / totalSeconds : 1;
    const offset = CIRCUMFERENCE * (1 - ratio);
    progressRing.style.strokeDashoffset = offset;

    // Color states
    progressRing.classList.remove('warning', 'danger');
    if (ratio <= 0.1) progressRing.classList.add('danger');
    else if (ratio <= 0.25) progressRing.classList.add('warning');
  }

  function addLap() {
    lapCount++;
    const timeStr = formatTime(totalSeconds);
    lapCountEl.textContent = `Lap ${lapCount}`;

    const entry = document.createElement('div');
    entry.className = 'lap-entry latest';
    const name = timerNameEl.textContent || 'Interval Timer';
    entry.innerHTML = `<span>${name} &mdash; Lap ${lapCount}</span><span>${timeStr}</span>`;

    // Remove 'latest' from previous
    const prev = lapLog.querySelector('.latest');
    if (prev) prev.classList.remove('latest');

    lapLog.insertBefore(entry, lapLog.firstChild);

    // Pulse display
    timeDisplay.classList.remove('pulsing');
    void timeDisplay.offsetWidth;
    timeDisplay.classList.add('pulsing');
  }

  function tick() {
    if (remaining <= 0) {
      playBell();
      addLap();
      if (autoToggle.checked) {
        remaining = totalSeconds;
        updateDisplay();
      } else {
        stopTimer();
        remaining = 0;
        updateDisplay();
      }
      return;
    }
    remaining--;
    updateDisplay();
  }

  async function startTimer() {
    await ensureAudio();
    totalSeconds = getInputSeconds();
    if (totalSeconds <= 0) return;

    if (!running) {
      remaining = totalSeconds;
      lapCount = 0;
      lapCountEl.textContent = 'Lap 0';
      lapLog.innerHTML = '';
      updateDisplay();
    }

    running = true;
    startBtn.textContent = 'Pause';
    startBtn.classList.add('running');
    inputMin.disabled = true;
    inputSec.disabled = true;

    interval = setInterval(tick, 1000);
  }

  function pauseTimer() {
    clearInterval(interval);
    interval = null;
    running = false;
    startBtn.textContent = 'Resume';
    startBtn.classList.remove('running');
  }

  function stopTimer() {
    clearInterval(interval);
    interval = null;
    running = false;
    startBtn.textContent = 'Start';
    startBtn.classList.remove('running');
    inputMin.disabled = false;
    inputSec.disabled = false;
  }

  function resetTimer() {
    stopTimer();
    lapCount = 0;
    lapCountEl.textContent = 'Lap 0';
    lapLog.innerHTML = '';
    totalSeconds = getInputSeconds();
    remaining = totalSeconds;
    updateDisplay();
  }

  startBtn.addEventListener('click', () => {
    if (!running && startBtn.textContent === 'Start') {
      startTimer();
    } else if (!running && startBtn.textContent === 'Resume') {
      running = true;
      startBtn.textContent = 'Pause';
      startBtn.classList.add('running');
      interval = setInterval(tick, 1000);
    } else {
      pauseTimer();
    }
  });

  resetBtn.addEventListener('click', resetTimer);

  document.getElementById('testBellBtn').addEventListener('click', () => {
    playBell();
  });

  // Update preview when inputs change
  [inputMin, inputSec].forEach(el => {
    el.addEventListener('change', () => {
      if (!running) {
        totalSeconds = getInputSeconds();
        remaining = totalSeconds;
        updateDisplay();
      }
    });
  });

  // Init
  totalSeconds = getInputSeconds();
  remaining = totalSeconds;
  progressRing.style.strokeDasharray = CIRCUMFERENCE;
  progressRing.style.strokeDashoffset = 0;
  updateDisplay();
</script>
</body>
</html>
